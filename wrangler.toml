name = "skyline-exterior-cleaning"
compatibility_date = "2024-09-23"
# Required by @cloudflare/next-on-pages so the Next.js runtime works on Pages.
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# D1 — leads database for the /api/quote handler.
#
# IMPORTANT: bindings attach only to deployments created AFTER the binding
# exists. Any change here (or to the matching binding in the Pages dashboard)
# requires a brand-new deployment to take effect on the live site. A redeploy
# of a build that predates the binding will NOT have `env.DB`.
#
# Setup history:
#   wrangler d1 create skyline-leads
#   wrangler d1 execute skyline-leads --remote --file=./migrations/0001_leads.sql
[[d1_databases]]
binding = "DB"
database_name = "skyline-leads"
database_id = "422fc8fe-e8aa-40b3-8ce9-7cb8d43dcfcf"

# Optional KV namespace for IP rate limiting (the API skips limiting if absent).
# To enable: create the namespace, uncomment, paste the id, then redeploy.
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"
